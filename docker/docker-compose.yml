version: '3.8'

services:
  react-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  backend:
    image: sportsclub-nginx:latest
    ports:
      - "8000:80"
    external_links:
      - sportsclub-postgres-1:postgres
